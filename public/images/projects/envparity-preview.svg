<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title description">
  <title id="title">EnvParity environment-variable analysis</title>
  <desc id="description">A dark terminal-style report comparing source usage with an environment example file.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07130f"/>
      <stop offset="1" stop-color="#0d2019"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#12251e"/>
      <stop offset="1" stop-color="#0b1914"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#3df2a0" stroke-opacity=".05"/>
    </pattern>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000" flood-opacity=".38"/>
    </filter>
  </defs>

  <rect width="1200" height="675" rx="28" fill="url(#background)"/>
  <rect width="1200" height="675" rx="28" fill="url(#grid)"/>
  <circle cx="1090" cy="82" r="180" fill="#3df2a0" opacity=".05"/>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <g transform="translate(74 56)">
      <rect width="54" height="54" rx="13" fill="#3df2a0"/>
      <path d="M15 18h24M15 27h16M15 36h24" fill="none" stroke="#07130f" stroke-width="4" stroke-linecap="round"/>
      <text x="72" y="39" fill="#f3fff9" font-size="38" font-weight="700">EnvParity</text>
      <g transform="translate(756 7)" font-size="15" font-weight="700">
        <rect width="84" height="36" rx="18" fill="#3df2a0" fill-opacity=".13" stroke="#3df2a0" stroke-opacity=".45"/>
        <text x="42" y="23" text-anchor="middle" fill="#83ffc0">CLI</text>
        <rect x="96" width="162" height="36" rx="18" fill="#75a7ff" fill-opacity=".12" stroke="#75a7ff" stroke-opacity=".45"/>
        <text x="177" y="23" text-anchor="middle" fill="#a9c7ff">GITHUB ACTION</text>
      </g>
    </g>

    <g transform="translate(74 143)" filter="url(#shadow)">
      <rect width="1052" height="458" rx="20" fill="url(#panel)" stroke="#315b49"/>
      <path d="M0 64h1052" stroke="#315b49"/>
      <circle cx="30" cy="32" r="6" fill="#ff6978"/>
      <circle cx="52" cy="32" r="6" fill="#ffc66d"/>
      <circle cx="74" cy="32" r="6" fill="#3df2a0"/>
      <text x="526" y="38" text-anchor="middle" fill="#7da392" font-size="15">envparity analyze</text>

      <g transform="translate(34 94)">
        <text fill="#91a99e" font-size="15">$ envparity --strict --format stylish</text>
        <text y="40" fill="#f4fff9" font-size="18" font-weight="700">Environment parity report</text>

        <g transform="translate(0 70)">
          <rect width="282" height="74" rx="12" fill="#08140f" stroke="#315b49"/>
          <text x="18" y="27" fill="#7da392" font-size="13">REFERENCED</text>
          <text x="18" y="58" fill="#f3fff9" font-size="27" font-weight="700">4</text>
          <text x="70" y="56" fill="#83ffc0" font-size="14">source keys</text>
        </g>
        <g transform="translate(298 70)">
          <rect width="282" height="74" rx="12" fill="#08140f" stroke="#315b49"/>
          <text x="18" y="27" fill="#7da392" font-size="13">DOCUMENTED</text>
          <text x="18" y="58" fill="#f3fff9" font-size="27" font-weight="700">3</text>
          <text x="70" y="56" fill="#a9c7ff" font-size="14">example keys</text>
        </g>
        <g transform="translate(596 70)">
          <rect width="282" height="74" rx="12" fill="#08140f" stroke="#6d392e"/>
          <text x="18" y="27" fill="#7da392" font-size="13">FINDINGS</text>
          <text x="18" y="58" fill="#ffc66d" font-size="27" font-weight="700">2</text>
          <text x="70" y="56" fill="#ffc66d" font-size="14">action needed</text>
        </g>

        <g transform="translate(0 174)">
          <rect width="984" height="54" rx="10" fill="#1a1710" stroke="#715c2d"/>
          <rect x="14" y="14" width="80" height="26" rx="13" fill="#ffc66d" fill-opacity=".14"/>
          <text x="54" y="32" text-anchor="middle" fill="#ffc66d" font-size="12" font-weight="700">MISSING</text>
          <text x="114" y="33" fill="#f3fff9" font-size="15">DATABASE_URL</text>
          <text x="288" y="33" fill="#91a99e" font-size="14">Referenced in src/config.ts:8 but absent from .env.example</text>
        </g>
        <g transform="translate(0 240)">
          <rect width="984" height="54" rx="10" fill="#101a19" stroke="#385455"/>
          <rect x="14" y="14" width="80" height="26" rx="13" fill="#75a7ff" fill-opacity=".14"/>
          <text x="54" y="32" text-anchor="middle" fill="#a9c7ff" font-size="12" font-weight="700">UNUSED</text>
          <text x="114" y="33" fill="#f3fff9" font-size="15">LEGACY_TOKEN</text>
          <text x="276" y="33" fill="#91a99e" font-size="14">Documented but not referenced by analyzed source files</text>
        </g>

        <g transform="translate(0 324)">
          <text y="20" fill="#ffc66d" font-size="15" font-weight="700">✗ parity check failed</text>
          <text x="224" y="20" fill="#7da392" font-size="14">2 findings · exit code 1 · 48 ms</text>
          <text x="984" y="20" text-anchor="end" fill="#83ffc0" font-size="14">JSON · SARIF · stylish</text>
        </g>
      </g>
    </g>
  </g>
</svg>
