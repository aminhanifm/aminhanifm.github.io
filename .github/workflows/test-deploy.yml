name: Test Build

on:
  pull_request:
    branches: [main]

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout CSV Health
        uses: actions/checkout@v4
        with:
          repository: aminhanifm/CSV-Health
          ref: main
          path: csv-health

      - name: Checkout RepoReady
        uses: actions/checkout@v4
        with:
          repository: aminhanifm/RepoReady
          ref: main
          path: repo-ready

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            csv-health/package-lock.json
            repo-ready/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify static documents
        run: npm run verify:docs

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Build
        run: npm run build

      - name: Install CSV Health dependencies
        working-directory: csv-health
        run: npm ci

      - name: Audit CSV Health production dependencies
        working-directory: csv-health
        run: npm audit --omit=dev

      - name: Build CSV Health
        working-directory: csv-health
        run: npm run build -- --base=/projects/csv-health/

      - name: Add CSV Health to site
        run: |
          mkdir -p dist/projects/csv-health
          cp -R csv-health/dist/. dist/projects/csv-health/
          test -f dist/projects/csv-health/index.html

      - name: Install RepoReady dependencies
        working-directory: repo-ready
        run: npm ci

      - name: Audit RepoReady production dependencies
        working-directory: repo-ready
        run: npm audit --omit=dev

      - name: Build RepoReady
        working-directory: repo-ready
        run: npm run build -- --base=/projects/repo-ready/

      - name: Add RepoReady to site
        run: |
          mkdir -p dist/projects/repo-ready
          cp -R repo-ready/dist/. dist/projects/repo-ready/
          test -f dist/projects/repo-ready/index.html
