name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout CSV Health
        uses: actions/checkout@v4
        with:
          repository: aminhanifm/CSV-Health
          ref: main
          path: csv-health

      - name: Checkout RepoReady
        uses: actions/checkout@v4
        with:
          repository: aminhanifm/RepoReady
          ref: main
          path: repo-ready

      - name: Checkout EnvParity
        uses: actions/checkout@v4
        with:
          repository: aminhanifm/EnvParity
          ref: main
          path: envparity

      - name: Checkout IssueSafe
        uses: actions/checkout@v4
        with:
          repository: aminhanifm/IssueSafe
          ref: main
          path: issuesafe

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            csv-health/package-lock.json
            repo-ready/package-lock.json
            envparity/package-lock.json
            issuesafe/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify static documents
        run: npm run verify:docs

      - name: Build site
        env:
          VITE_GA_MEASUREMENT_ID: ${{ vars.VITE_GA_MEASUREMENT_ID }}
        run: npm run build

      - name: Install CSV Health dependencies
        working-directory: csv-health
        run: npm ci

      - name: Build CSV Health
        working-directory: csv-health
        run: npm run build -- --base=/projects/csv-health/

      - name: Add CSV Health to site
        run: |
          mkdir -p dist/projects/csv-health
          cp -R csv-health/dist/. dist/projects/csv-health/

      - name: Install RepoReady dependencies
        working-directory: repo-ready
        run: npm ci

      - name: Build RepoReady
        working-directory: repo-ready
        run: npm run build -- --base=/projects/repo-ready/

      - name: Add RepoReady to site
        run: |
          mkdir -p dist/projects/repo-ready
          cp -R repo-ready/dist/. dist/projects/repo-ready/

      - name: Install EnvParity dependencies
        working-directory: envparity
        run: npm ci

      - name: Build EnvParity demo
        working-directory: envparity
        run: npm run build:demo -- --base=/projects/EnvParity/

      - name: Add EnvParity to site
        run: |
          mkdir -p dist/projects/EnvParity
          cp -R envparity/demo-dist/. dist/projects/EnvParity/

      - name: Install IssueSafe dependencies
        working-directory: issuesafe
        run: npm ci

      - name: Build IssueSafe demo
        working-directory: issuesafe
        run: npm run build:demo -- --base=/projects/IssueSafe/

      - name: Add IssueSafe to site
        run: |
          mkdir -p dist/projects/IssueSafe
          cp -R issuesafe/demo-dist/. dist/projects/IssueSafe/

      - name: Add analytics to nested and privacy pages
        env:
          VITE_GA_MEASUREMENT_ID: ${{ vars.VITE_GA_MEASUREMENT_ID }}
        run: |
          npm run inject:analytics
          npm run verify:analytics

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
